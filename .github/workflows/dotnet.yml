# This workflow will build and test a .NET project and publish DLL artifacts.

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Release (library)
      run: dotnet build GEffectsLogic/GEffectsLogic.csproj -c Release --no-restore

    - name: Build Debug (library)
      run: dotnet build GEffectsLogic/GEffectsLogic.csproj -c Debug --no-restore

    - name: Build Debug (tests)
      run: dotnet build GEffectLogicTests/GEffectLogicTests.csproj -c Debug --no-restore

    - name: Test (Debug)
      run: dotnet test GEffectLogicTests/GEffectLogicTests.csproj -c Debug --verbosity normal

    - name: Prepare DLL artifacts
      run: |
        mkdir -p artifacts
        cp GEffectsLogic/bin/Release/net10.0/GEffectsLogic.dll artifacts/GEffectsLogic.dll
        cp GEffectsLogic/bin/Debug/net10.0/GEffectsLogic.dll artifacts/GEffectsLogic.dev.dll

    - name: Upload DLL artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GEffectsLogic-dlls
        path: artifacts/
