# This workflow will build and test a .NET project and publish DLL artifacts.

name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build all configurations
      run: |
        dotnet build GEffectsLogic/GEffectsLogic.csproj -c Release --no-restore
        dotnet build GEffectsLogic/GEffectsLogic.csproj -c Debug --no-restore

    - name: Collect artifacts
      run: |
        mkdir -p artifacts/net10.0/release
        mkdir -p artifacts/net10.0/debug
        mkdir -p artifacts/net481/release
        mkdir -p artifacts/net481/debug

        cp GEffectsLogic/bin/Release/net10.0/GEffectsLogic.dll  artifacts/net10.0/release/
        cp GEffectsLogic/bin/Release/net10.0/GEffectsLogic.deps.json artifacts/net10.0/release/
        cp GEffectsLogic/bin/Release/net10.0/GEffectsLogic.pdb  artifacts/net10.0/release/
        cp GEffectsLogic/bin/Debug/net10.0/GEffectsLogic.dll    artifacts/net10.0/debug/
        cp GEffectsLogic/bin/Debug/net10.0/GEffectsLogic.deps.json artifacts/net10.0/debug/
        cp GEffectsLogic/bin/Debug/net10.0/GEffectsLogic.pdb    artifacts/net10.0/debug/

        cp GEffectsLogic/bin/Release/net481/GEffectsLogic.dll   artifacts/net481/release/
        cp GEffectsLogic/bin/Release/net481/GEffectsLogic.pdb   artifacts/net481/release/
        cp GEffectsLogic/bin/Debug/net481/GEffectsLogic.dll     artifacts/net481/debug/
        cp GEffectsLogic/bin/Debug/net481/GEffectsLogic.pdb     artifacts/net481/debug/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GEffectsLogic
        path: artifacts/

  test:
    runs-on: ubuntu-latest
    needs: build-artifacts

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Debug (tests)
      run: dotnet build GEffectLogicTests/GEffectLogicTests.csproj -c Debug --no-restore

    - name: Test (Debug)
      run: dotnet test GEffectLogicTests/GEffectLogicTests.csproj -c Debug --no-build --verbosity normal
