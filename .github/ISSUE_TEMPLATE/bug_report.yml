name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Detailed steps to reproduce the behavior, including any specific settings used.
      placeholder: |
        1. Set tolerance to ...
        2. Call Update() with ...
        3. Observe that ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste any relevant log output, error messages, or stack traces. This field is rendered as code.
      render: shell
    validations:
      required: true

  - type: textarea
    id: settings
    attributes:
      label: Settings Used
      description: List any LogicSettings values or configuration that differ from defaults.
      placeholder: |
        GzPTolerance = ...
        deltaTime = ...
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: The version or commit hash you are using.
      placeholder: e.g. v0.1.0 or commit abc1234
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: false

  - type: input
    id: dotnet-version
    attributes:
      label: .NET Version
      description: Output of `dotnet --version`
      placeholder: e.g. 10.0.100
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or graph output that might help.
    validations:
      required: false
